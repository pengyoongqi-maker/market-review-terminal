<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Market Review Terminal</title>
  <style>
    :root{--bg:#0a0a0a;--surface:#111;--surface-2:#161616;--surface-3:#1e1e1e;--line:rgba(255,255,255,0.07);--line-2:rgba(255,255,255,0.13);--text:#f0f0f0;--muted:#555;--muted-2:#888;--white:#fff;--radius:4px;--radius-lg:8px}
    [data-theme="light"]{--bg:#f5f5f5;--surface:#fff;--surface-2:#efefef;--surface-3:#e4e4e4;--line:rgba(0,0,0,0.07);--line-2:rgba(0,0,0,0.13);--text:#111;--muted:#bbb;--muted-2:#666;--white:#111}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:"Helvetica Neue",Helvetica,"PingFang SC",Arial,sans-serif;font-size:14px;line-height:1.6;min-height:100vh;letter-spacing:0.01em;transition:background .25s,color .25s}
    .wrap{max-width:1240px;margin:0 auto;padding:32px 24px}
    .theme-toggle{position:fixed;top:16px;right:20px;z-index:999;width:32px;height:32px;border-radius:50%;background:var(--surface-2);border:1px solid var(--line-2);color:var(--muted-2);font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s}
    .theme-toggle:hover{border-color:var(--muted-2);color:var(--text)}
    .topbar{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;margin-bottom:22px;padding-bottom:22px;border-bottom:1px solid var(--line-2)}
    .brand{font-size:38px;font-weight:800;letter-spacing:-0.04em;color:var(--white);line-height:1}
    .brand-sub{font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted-2);margin-top:6px}
    .topbar-right{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
    button{border:none;cursor:pointer;font:inherit;transition:.15s ease}
    .tb-btn{height:30px;padding:0 11px;border-radius:2px;background:transparent;border:1px solid var(--line-2);color:var(--muted-2);font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;display:flex;align-items:center;gap:4px;cursor:pointer;transition:.15s;white-space:nowrap}
    .tb-btn:hover{border-color:var(--muted-2);color:var(--text)}
    .tb-btn.primary{background:var(--white);color:var(--bg);border-color:var(--white);font-weight:700}
    .tb-btn.primary:hover{opacity:.85}
    [data-theme="light"] .tb-btn.primary{background:#111;color:#fff;border-color:#111}
    .tb-btn.danger:hover{border-color:#c0392b;color:#c0392b}
    .s-dot{width:5px;height:5px;border-radius:50%;background:var(--muted);flex-shrink:0}
    .s-dot.on{background:#5cdb5c;box-shadow:0 0 6px #5cdb5c}
    .s-dot.syncing{background:#f0c040;box-shadow:0 0 6px #f0c040;animation:pulse 1s infinite}
    .s-dot.error{background:#e05555;box-shadow:0 0 6px #e05555}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .statusbar{display:flex;align-items:center;gap:10px;margin-bottom:18px;padding:9px 14px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);font-size:11px;color:var(--muted-2);letter-spacing:0.05em;text-transform:uppercase}
    /* SYNC MODAL */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:9999;align-items:center;justify-content:center}
    .modal-overlay.show{display:flex}
    .modal{background:var(--surface);border:1px solid var(--line-2);border-radius:var(--radius-lg);padding:28px 32px;width:min(480px,92vw);display:flex;flex-direction:column;gap:18px}
    .modal h2{font-size:17px;font-weight:700;color:var(--white)}
    [data-theme="light"] .modal h2{color:#111}
    .modal p{font-size:12px;color:var(--muted-2);line-height:1.7}
    .modal label{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted-2)}
    .modal input{width:100%;margin-top:6px;background:var(--surface-2);border:1px solid var(--line-2);border-radius:var(--radius);color:var(--text);font-size:13px;font-family:"SF Mono",monospace;padding:9px 12px;outline:none}
    .modal input:focus{border-color:var(--muted-2)}
    .modal-btns{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
    .modal-btns button{padding:8px 18px;border-radius:var(--radius);font-size:12px;font-weight:600;letter-spacing:0.06em}
    .btn-cancel{background:var(--surface-2);color:var(--muted-2);border:1px solid var(--line-2)}
    .btn-save{background:var(--white);color:var(--bg)}
    [data-theme="light"] .btn-save{background:#111;color:#fff}
    .btn-clear{background:transparent;color:#e05555;border:1px solid rgba(224,85,85,.3);margin-right:auto}
    .modal a{color:var(--muted-2);font-size:11px}
    .modal a:hover{color:var(--white)}
    .record-list{display:flex;flex-direction:column;gap:2px}
    details.record{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-lg);overflow:hidden}
    details.record[open]{border-color:var(--line-2);margin-bottom:8px}
    summary{list-style:none;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:14px;padding:16px 18px;user-select:none}
    summary::-webkit-details-marker{display:none}
    summary:hover{background:var(--surface-2)}
    details[open] summary{border-bottom:1px solid var(--line)}
    .sum-left{display:flex;align-items:baseline;gap:14px}
    .date-label{font-size:19px;font-weight:700;letter-spacing:-0.02em;color:var(--white)}
    .date-sub{font-size:11px;color:var(--muted-2);letter-spacing:0.08em;text-transform:uppercase}
    .sum-right{display:flex;gap:6px;align-items:center}
    .chevron{font-size:11px;color:var(--muted);transition:transform .2s}
    details[open] .chevron{transform:rotate(180deg)}
    .record-body{padding:16px;display:flex;flex-direction:column;gap:18px;background:var(--bg)}
    .asset-block{border:1px solid var(--line);border-radius:var(--radius-lg);overflow:hidden}
    .asset-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--line);background:var(--surface-2);gap:12px;flex-wrap:wrap}
    .asset-meta{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
    .asset-label{font-size:10px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted-2)}
    .asset-name{font-size:16px;font-weight:700;color:var(--white);letter-spacing:-0.01em}
    [data-theme="light"] .asset-name{color:#111}
    .ticker-bar{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
    .tick-chip{padding:4px 9px;border-radius:2px;border:1px solid var(--line-2);background:var(--surface);font-size:11px;letter-spacing:0.08em;color:var(--muted-2);cursor:pointer;font-family:"SF Mono","Fira Code",monospace;transition:.15s;display:flex;align-items:center;gap:5px}
    .tick-chip:hover{background:var(--surface-3);color:var(--white)}
    .tick-chip.active{background:var(--white);color:var(--bg);border-color:var(--white)}
    [data-theme="light"] .tick-chip.active{background:#111;color:#fff;border-color:#111}
    .tick-chip .del-chip{font-size:10px;opacity:.5;line-height:1}
    .tick-chip .del-chip:hover{opacity:1}
    .add-chip-form{display:flex;gap:4px;align-items:center}
    .chip-input{background:var(--surface);border:1px solid var(--line-2);border-radius:2px;color:var(--text);font-size:11px;font-family:"SF Mono",monospace;letter-spacing:0.08em;padding:4px 9px;width:140px;outline:none}
    .chip-input::placeholder{color:var(--muted)}
    .chip-input:focus{background:var(--surface-3)}
    .chip-input-label{font-size:11px;color:var(--muted-2);white-space:nowrap}
    .go-btn{padding:4px 9px;border-radius:2px;background:var(--surface-3);color:var(--muted-2);font-size:11px;border:1px solid var(--line-2);letter-spacing:0.06em}
    .go-btn:hover{color:var(--white)}
    .asset-actions{display:flex;gap:6px;flex-shrink:0}
    .chart-container{background:var(--bg);border-bottom:1px solid var(--line)}
    .chart-frame{width:100%;height:340px;border:none;display:block}
    .table-scroll{overflow-x:auto}
    table{width:100%;min-width:820px;border-collapse:collapse;background:var(--surface)}
    thead th{text-align:left;padding:10px 14px;font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted-2);border-bottom:1px solid var(--line-2);background:var(--surface-2)}
    tbody td{padding:12px 14px;font-size:14px;line-height:1.65;border-bottom:1px solid var(--line);vertical-align:top;color:var(--text)}
    tbody tr:last-child td{border-bottom:none}
    tbody tr:nth-child(even) td{background:var(--surface-2)}
    tbody tr:hover td{background:var(--surface-3)}
    td[contenteditable="true"]:focus{outline:1px solid var(--line-2);background:var(--surface-3)!important}
    td.phase{width:110px;font-family:"SF Mono","Fira Code",monospace;font-size:12px;color:var(--muted-2);text-align:center;white-space:nowrap}
    td.level{width:140px;font-family:"SF Mono","Fira Code",monospace;font-size:13px;color:var(--white);font-weight:600}
    [data-theme="light"] td.level{color:#111}
    td.invalid{color:var(--muted-2);font-size:13px}
    @media(max-width:900px){.topbar{flex-direction:column;align-items:flex-start}.sum-left{flex-direction:column;gap:4px}}
  </style>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💩</text></svg>">
</head>
<body>

<!-- SYNC MODAL -->
<div class="modal-overlay" id="syncModal">
  <div class="modal">
    <h2>☁️ Gist 跨设备同步设置</h2>
    <p>使用 GitHub Gist 免费同步数据。你的复盘记录会保存在一个私密 Gist 中，手机和电脑访问同一网址即可自动同步。</p>
    <p>🔑 需要 GitHub Personal Access Token（只需勾选 <strong>gist</strong> 权限）<br>
    <a href="https://github.com/settings/tokens/new?scopes=gist&description=MarketReviewSync" target="_blank">→ 点此一键生成 Token</a></p>
    <div>
      <label>GitHub Token</label>
      <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" autocomplete="off" />
    </div>
    <div>
      <label>Gist ID（首次留空，保存后自动生成）</label>
      <input type="text" id="gistIdInput" placeholder="留空则自动创建新 Gist" />
    </div>
    <div class="modal-btns">
      <button class="btn-clear" id="clearSyncBtn">清除配置</button>
      <button class="btn-cancel" id="cancelSyncBtn">取消</button>
      <button class="btn-save" id="saveSyncBtn">保存并同步</button>
    </div>
  </div>
</div>

<button class="theme-toggle" id="themeBtn" title="切换亮/暗色">◑</button>

<div class="wrap">
  <div class="topbar">
    <div>
      <div class="brand">Market Review</div>
      <div class="brand-sub" id="brandSub">黄金 · A股 · 本地存储</div>
    </div>
    <div class="topbar-right">
      <button class="tb-btn" id="syncBtn">☁ 同步</button>
      <button class="tb-btn" id="pullBtn">↻ 拉取</button>
      <button class="tb-btn" id="toggleAllBtn">展开</button>
      <button class="tb-btn" id="archiveBtn">归档</button>
      <button class="tb-btn" id="exportCsvBtn">导出CSV</button>
      <label class="tb-btn" style="cursor:pointer">导入CSV<input type="file" id="importCsvFile" accept=".csv" style="display:none"></label>
      <button class="tb-btn primary" id="newRecordBtn">＋ 新建</button>
    </div>
  </div>

  <div class="statusbar">
    <span class="s-dot on" id="statusDot"></span>
    <span id="statusText">就绪</span>
  </div>

  <div class="record-list" id="recordList"></div>
</div>

<script>
const COLS = ['phase','judgment','levels','strategy','invalidation'];
const COL_LABELS = ['阶段','核心判断','关键位','交易思路','失效/转向条件'];
const ROWS = 5;
const GIST_FILENAME = 'market-review-data.json';

let allOpen = false;

// ─── GIST SYNC ───────────────────────────────────────────────
function getSyncCfg(){
  return { token: localStorage.getItem('sync_token')||'', gistId: localStorage.getItem('sync_gist_id')||'' };
}
function setSyncCfg(token, gistId){
  localStorage.setItem('sync_token', token);
  if(gistId) localStorage.setItem('sync_gist_id', gistId);
}
function gatherPayload(){
  const out = {};
  for(let i=0;i<localStorage.length;i++){
    const k = localStorage.key(i);
    if(k.startsWith('journal_')||k.startsWith('presets_')) out[k] = localStorage.getItem(k);
  }
  return out;
}
async function pushToGist(){
  const {token, gistId} = getSyncCfg();
  if(!token) return;
  setDot('syncing'); setStatusText('正在推送到 Gist...');
  const body = JSON.stringify({ files:{ [GIST_FILENAME]:{ content: JSON.stringify(gatherPayload()) } }, description:'Market Review Data', public:false });
  try{
    let url = 'https://api.github.com/gists';
    let method = 'POST';
    if(gistId){ url += '/'+gistId; method = 'PATCH'; }
    const res = await fetch(url, { method, headers:{ Authorization:'token '+token, 'Content-Type':'application/json' }, body });
    if(!res.ok) throw new Error('HTTP '+res.status);
    const json = await res.json();
    if(!gistId){
      localStorage.setItem('sync_gist_id', json.id);
      document.getElementById('gistIdInput').value = json.id;
    }
    setDot('on'); setStatusText('✓ 已同步到 Gist · '+new Date().toLocaleString('zh-CN'));
    setTimeout(()=>setDot('on'), 3000);
    updateBrandSub();
  } catch(e){
    setDot('error'); setStatusText('同步失败：'+e.message);
  }
}
async function pullFromGist(){
  const {token, gistId} = getSyncCfg();
  if(!token||!gistId){ alert('请先配置 Token 和 Gist ID'); document.getElementById('syncModal').classList.add('show'); return; }
  setDot('syncing'); setStatusText('正在从 Gist 拉取数据...');
  try{
    const res = await fetch('https://api.github.com/gists/'+gistId, { headers:{ Authorization:'token '+token } });
    if(!res.ok) throw new Error('HTTP '+res.status);
    const json = await res.json();
    const raw = json.files?.[GIST_FILENAME]?.content;
    if(!raw) throw new Error('Gist 中无数据文件');
    const data = JSON.parse(raw);
    Object.keys(data).forEach(k=>localStorage.setItem(k, data[k]));
    setDot('on'); setStatusText('✓ 已从 Gist 拉取最新数据');
    setTimeout(()=>{ setDot('on'); renderAll(); }, 800);
  } catch(e){
    setDot('error'); setStatusText('拉取失败：'+e.message);
  }
}
function setDot(state){
  const dot = document.getElementById('statusDot');
  dot.className = 's-dot'+(state?' '+state:'');
}
function setStatusText(msg){
  document.getElementById('statusText').textContent = msg;
}
function updateBrandSub(){
  const {gistId} = getSyncCfg();
  document.getElementById('brandSub').textContent = gistId
    ? '黄金 · A股 · ☁ Gist 同步已启用'
    : '黄金 · A股 · 本地存储';
}
// ─────────────────────────────────────────────────────────────

function getTodayKey(){
  const d = new Date();
  return `journal_${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function getDateFromKey(k){ return k.replace('journal_',''); }

function loadAll(){
  const keys = Object.keys(localStorage).filter(k=>k.startsWith('journal_')).sort().reverse();
  return keys.map(k=>{
    try{ return {key:k, data:JSON.parse(localStorage.getItem(k))}; }
    catch(e){ return null; }
  }).filter(Boolean);
}

function saveRecord(key, data){
  if(!data.meta) data.meta = {};
  data.meta.updatedAt = new Date().toLocaleString('zh-CN');
  localStorage.setItem(key, JSON.stringify(data));
  setDot('on');
  setStatusText('已保存 · '+data.meta.updatedAt);
  setTimeout(()=>pushToGist(), 2500);
}

function newEmptyData(date){
  const emptyRows = Array(ROWS).fill(null).map(()=>({phase:'',judgment:'',levels:'',strategy:'',invalidation:''}));
  return {date, gold:[...emptyRows.map(r=>({...r}))], ashare:[...emptyRows.map(r=>({...r}))], goldSym:'OANDA:XAUUSD', ashareSym:'SSE:000001'};
}

function buildChartUrl(sym){
  return `https://s.tradingview.com/widgetembed/?frameElementId=tv_chart_widget&symbol=${encodeURIComponent(sym)}&interval=D&hidesidetoolbar=0&symboledit=1&saveimage=1&toolbarbg=f1f3f6&studies=%5B%5D&theme=dark&style=1&timezone=Asia%2FShanghai&withdateranges=1&showpopupbutton=1&locale=zh_CN`;
}

function buildTable(rows, dateKey, assetKey){
  const thead = `<thead><tr>${COL_LABELS.map(l=>`<th>${l}</th>`).join('')}</tr></thead>`;
  const tbodyRows = rows.map((row,ri)=>`
    <tr>
      ${COLS.map(col=>`<td class="${col==='phase'?'phase':col==='levels'?'level':col==='invalidation'?'invalid':''}" contenteditable="true" data-asset="${assetKey}" data-row="${ri}" data-col="${col}">${row[col]||''}</td>`).join('')}
    </tr>
  `).join('');
  return `<div class="table-scroll"><table>${thead}<tbody>${tbodyRows}</tbody></table></div>`;
}

function buildAssetBlock(data, dateKey, assetKey, label){
  const sym = assetKey==='gold' ? data.goldSym : data.ashareSym;
  const symInputId = `sym_${dateKey}_${assetKey}`;
  const chartId = `chart_${dateKey}_${assetKey}`;
  return `
  <div class="asset-block">
    <div class="asset-header">
      <div class="asset-meta">
        <span class="asset-label">${label}</span>
        <span class="asset-name">${label==='黄金'?'GOLD':'A股'}</span>
      </div>
      <div class="ticker-bar">
        <span class="chip-input-label">品种代码：</span>
        <input class="chip-input" id="${symInputId}" value="${sym}" placeholder="如 OANDA:XAUUSD" />
        <button class="go-btn" onclick="updateChart('${dateKey}','${assetKey}','${symInputId}','${chartId}')">载入图表</button>
      </div>
    </div>
    <div class="chart-container">
      <iframe class="chart-frame" id="${chartId}" src="${buildChartUrl(sym)}"></iframe>
    </div>
    ${buildTable(data[assetKey], dateKey, assetKey)}
  </div>`;
}

function updateChart(dateKey, assetKey, symInputId, chartId){
  const sym = document.getElementById(symInputId).value.trim();
  if(!sym) return;
  const data = JSON.parse(localStorage.getItem(dateKey)||'{}');
  if(assetKey==='gold') data.goldSym = sym; else data.ashareSym = sym;
  saveRecord(dateKey, data);
  document.getElementById(chartId).src = buildChartUrl(sym);
}

function buildRecord(entry){
  const {key, data} = entry;
  const dateStr = getDateFromKey(key);
  const updatedAt = data.meta && data.meta.updatedAt ? data.meta.updatedAt : '';
  return `
  <details class="record" id="rec_${key}">
    <summary>
      <div class="sum-left">
        <span class="date-label">${dateStr}</span>
        <span class="date-sub">${updatedAt}</span>
      </div>
      <div class="sum-right">
        <span class="chevron">▼</span>
      </div>
    </summary>
    <div class="record-body">
      ${buildAssetBlock(data, key, 'gold', '黄金')}
      ${buildAssetBlock(data, key, 'ashare', 'A股')}
    </div>
  </details>`;
}

function renderAll(){
  const entries = loadAll();
  const list = document.getElementById('recordList');
  list.innerHTML = entries.map(buildRecord).join('');
  attachEditors();
}

function attachEditors(){
  document.querySelectorAll('td[contenteditable]').forEach(td=>{
    td.addEventListener('blur', ()=>{
      const recKey = td.closest('details').id.replace('rec_','');
      const asset = td.dataset.asset;
      const ri = +td.dataset.row;
      const col = td.dataset.col;
      const data = JSON.parse(localStorage.getItem(recKey)||'{}');
      if(!data[asset]) return;
      data[asset][ri][col] = td.innerText.trim();
      saveRecord(recKey, data);
    });
  });
}

// SYNC MODAL
document.getElementById('syncBtn').addEventListener('click',()=>{
  const {token, gistId} = getSyncCfg();
  document.getElementById('tokenInput').value = token;
  document.getElementById('gistIdInput').value = gistId;
  document.getElementById('syncModal').classList.add('show');
});
document.getElementById('cancelSyncBtn').addEventListener('click',()=>{
  document.getElementById('syncModal').classList.remove('show');
});
document.getElementById('saveSyncBtn').addEventListener('click', async ()=>{
  const token  = document.getElementById('tokenInput').value.trim();
  const gistId = document.getElementById('gistIdInput').value.trim();
  if(!token){ alert('请输入 Token'); return; }
  setSyncCfg(token, gistId);
  document.getElementById('syncModal').classList.remove('show');
  updateBrandSub();
  await pushToGist();
});
document.getElementById('clearSyncBtn').addEventListener('click',()=>{
  if(!confirm('清除同步配置？不会删除本地数据。')) return;
  localStorage.removeItem('sync_token'); localStorage.removeItem('sync_gist_id');
  document.getElementById('tokenInput').value = ''; document.getElementById('gistIdInput').value = '';
  document.getElementById('syncModal').classList.remove('show');
  updateBrandSub();
});
document.getElementById('pullBtn').addEventListener('click', pullFromGist);

document.getElementById('newRecordBtn').addEventListener('click',()=>{
  const key = getTodayKey();
  if(!localStorage.getItem(key)){
    const d = getDateFromKey(key);
    saveRecord(key, newEmptyData(d));
  }
  renderAll();
  const el = document.getElementById('rec_'+key);
  if(el){ el.open = true; el.scrollIntoView({behavior:'smooth'}); }
});

document.getElementById('toggleAllBtn').addEventListener('click',()=>{
  allOpen = !allOpen;
  document.querySelectorAll('details.record').forEach(d=>d.open=allOpen);
  document.getElementById('toggleAllBtn').textContent = allOpen?'折叠':'展开';
});

document.getElementById('themeBtn').addEventListener('click',()=>{
  const html = document.documentElement;
  const cur = html.getAttribute('data-theme');
  html.setAttribute('data-theme', cur==='light'?'dark':'light');
  localStorage.setItem('theme', html.getAttribute('data-theme'));
});

document.getElementById('archiveBtn').addEventListener('click',()=>{
  const entries = loadAll();
  const blob = new Blob([JSON.stringify(entries.map(e=>e.data),null,2)],{type:'application/json'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download = 'market_review_archive_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
});

document.getElementById('exportCsvBtn').addEventListener('click',()=>{
  const entries = loadAll();
  const rows = [['日期','资产','阶段','核心判断','关键位','交易思路','失效转向条件']];
  entries.forEach(({data})=>{
    ['gold','ashare'].forEach(asset=>{
      (data[asset]||[]).forEach(r=>{
        if(Object.values(r).some(v=>v))
          rows.push([data.date, asset==='gold'?'黄金':'A股', r.phase, r.judgment, r.levels, r.strategy, r.invalidation]);
      });
    });
  });
  const csv = rows.map(r=>r.map(c=>'"'+(c||'').replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download = 'market_review_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
});

document.getElementById('importCsvFile').addEventListener('change', e=>{
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev=>{
    const lines = ev.target.result.split('\n').slice(1);
    const grouped = {};
    lines.forEach(line=>{
      const cols = line.match(/"([^"]*)"/g);
      if(!cols||cols.length<7) return;
      const [date,asset,phase,judgment,levels,strategy,invalidation] = cols.map(c=>c.replace(/"/g,''));
      const key = 'journal_'+date;
      if(!grouped[key]){ grouped[key] = newEmptyData(date); }
      const assetKey = asset==='黄金'?'gold':'ashare';
      const emptyIdx = grouped[key][assetKey].findIndex(r=>!r.phase&&!r.judgment&&!r.levels&&!r.strategy&&!r.invalidation);
      if(emptyIdx>=0) grouped[key][assetKey][emptyIdx] = {phase,judgment,levels,strategy,invalidation};
      else grouped[key][assetKey].push({phase,judgment,levels,strategy,invalidation});
    });
    Object.entries(grouped).forEach(([k,d])=>saveRecord(k,d));
    renderAll();
    setStatusText('CSV导入完成'); setDot('on');
  };
  reader.readAsText(file,'utf-8');
});

const savedTheme = localStorage.getItem('theme')||'dark';
document.documentElement.setAttribute('data-theme', savedTheme);

updateBrandSub();
renderAll();
setStatusText('就绪 · 数据存储在浏览器本地'); setDot('on');
</script>
</body>
</html>
